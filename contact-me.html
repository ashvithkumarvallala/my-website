<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact-me</title>
</head>
<body>
    <header><b><h2>Fill Your Personal details</h2></b></header>
    <main>
        <form action=" text.html ">
        <section>
            <label for="Name">Enter Your Name : </label>
            <input type="text" id="Name" name="name" required>
        </section>
        <br>
        <section>
            <label for="Age">Date Of Birth : </label>
            <input type="date" id="Age" required>
        </section>
        <br>
        <section>
            <label>Gender : </label>
            <label for="Male">Male</label>
            <input type="radio" id="Male" name="gender">
            <label for="Female">Female</label>
            <input type="radio" id="Female" name="gender">
            <label for="Others">Others</label>
            <input type="radio" id="Others" name="gender">
        </section>
        <br>
        <section>
            <label for="College">Choose Your Collge : </label>
            <select name="College" id="College">
                <option value="KMIT">KMIT</option>
                <option value="VNR">VNR</option>
                <option value="MGIT">MGIT</option>
                <option value="SNIST">SNIST</option>
                <option value="OU">OU</option>
                <option value="JNTUH">JNTUH</option>
            </select>
        </section>
        <br>
        <section>
            <label for="CPGA">Current CGPA:</label>
            <select name="CPGA" id="CGPA">
                <option value=">9.5"> 9.6 - 10.0</option>
                <option value="9.0"> 9.0 - 9.5</option>
                <option value="8.5"> 8.5 - 8.9</option>
                <option value="8.0"> 8.0 - 8.4</option>
            </select>

        </section>
        <br>
        <section>
            <label for="email">email : </label>
            <input type="text" id="email" placeholder="enter your email" name="email" required>
        </section>
        <br>
        <section>
            <label for="language">Choose one Programming language:</label>
            <select name="language" id="language">
                <option value="python">python</option>
                <option value="java">java</option>
                <option value="c++">c++</option>
                <option value="R">R</option>
                <option value="Java script">JS</option>
            </select>
        </section>
        <br>
        <section>
            upload your passphoto:<input type="file" name="passphoto" required>
        </section>
        <br>
        <section>
            <label for="skills">Mention Two Projects That You have done:</label><br>
            <textarea id="skills" name="skills" rows="4" cols="20" required placeholder="Mention Here"></textarea>
        </section>
        <br>
        <input type="submit" value="submit" required>
        

        </form>
    </main>

    
</body>
</html>
